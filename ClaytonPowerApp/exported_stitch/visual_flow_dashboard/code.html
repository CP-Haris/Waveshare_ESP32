<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clayton Power LPS2 - Dashboard</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#313030",
                        "on-tertiary": "#571e00",
                        "secondary-fixed": "#e4e2e4",
                        "secondary": "#c8c6c8",
                        "inverse-primary": "#005bc1",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-fixed": "#351000",
                        "tertiary-fixed-dim": "#ffb595",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-fixed": "#001a41",
                        "secondary-fixed-dim": "#c8c6c8",
                        "surface-variant": "#353534",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed-variant": "#004493",
                        "on-secondary-container": "#b6b4b7",
                        "outline": "#8b90a0",
                        "on-surface": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#303032",
                        "surface-bright": "#393939",
                        "surface": "#131313",
                        "tertiary-container": "#ef6719",
                        "on-primary-container": "#00285c",
                        "outline-variant": "#414755",
                        "on-surface-variant": "#c1c6d7",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-container": "#4b8eff",
                        "surface-dim": "#131313",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary": "#002e69",
                        "surface-container-low": "#1c1b1b",
                        "on-error": "#690005",
                        "secondary-container": "#474649",
                        "on-secondary-fixed": "#1b1b1d",
                        "on-secondary-fixed-variant": "#474649",
                        "surface-container": "#201f1f",
                        "on-tertiary-container": "#4c1a00",
                        "error": "#ffb4ab",
                        "primary": "#007AFF",
                        "tertiary": "#ffb595",
                        "error-container": "#93000a",
                        "primary-fixed": "#d8e2ff",
                        "inverse-surface": "#e5e2e1",
                        "background": "#131313",
                        "on-background": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "sm": "8px",
                        "container-padding": "20px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "card-gap": "12px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-base": ["Inter"],
                        "data-tabular": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "data-tabular": ["18px", { "lineHeight": "1", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for a cleaner dashboard look */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        @keyframes flow-line {
            to {
                stroke-dashoffset: -20;
            }
        }
        .animate-flow {
            animation: flow-line 1s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base">
<!-- TopAppBar -->
<header class="flex justify-between items-center h-16 px-6 w-full docked full-width top-0 z-50 border-none bg-[#121212] flat no shadows">
<button class="hover:opacity-80 transition-all active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#007AFF]">bolt</span>
</button>
<h1 class="text-zinc-50 font-black tracking-tighter text-sm font-inter font-bold tracking-widest text-xs">CLAYTON POWER</h1>
<button class="hover:opacity-80 transition-all active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#007AFF]">battery_charging_full</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-container-padding pt-8 pb-32 flex flex-col items-center justify-center">
<!-- Central Flow Diagram Area -->
<div class="relative w-full max-w-[340px] aspect-[4/5] mx-auto">
<!-- Animated SVG Flow Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-0" preserveaspectratio="none" viewbox="0 0 100 100">
<!-- Solar to Center -->
<line class="stroke-primary animate-flow" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="1.5" x1="25" x2="50" y1="15" y2="40"></line>
<!-- Alt/Grid to Center -->
<line class="stroke-primary animate-flow" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="1.5" x1="75" x2="50" y1="15" y2="40"></line>
<!-- Center to AC Out -->
<line class="stroke-primary animate-flow" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="1.5" x1="50" x2="25" y1="60" y2="85"></line>
<!-- Center to DC Out -->
<line class="stroke-outline-variant" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="1.5" x1="50" x2="75" y1="60" y2="85"></line>
</svg>
<!-- Top Left: Solar Input -->
<div class="absolute top-[5%] left-[10%] flex flex-col items-center z-10 w-24">
<div class="w-12 h-12 rounded-full bg-surface-container-high border-2 border-primary flex items-center justify-center shadow-[0_0_15px_rgba(0,122,255,0.3)] mb-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">solar_power</span>
</div>
<span class="font-label-sm text-on-surface-variant mb-1">SOLAR</span>
<div class="bg-primary text-white text-[11px] font-bold px-3 py-1 rounded-full">320 W</div>
</div>
<!-- Top Right: Grid/Alt Input -->
<div class="absolute top-[5%] right-[10%] flex flex-col items-center z-10 w-24">
<div class="w-12 h-12 rounded-full bg-surface-container-high border-2 border-primary flex items-center justify-center shadow-[0_0_15px_rgba(0,122,255,0.3)] mb-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">electrical_services</span>
</div>
<span class="font-label-sm text-on-surface-variant mb-1">GRID / ALT</span>
<div class="bg-primary text-white text-[11px] font-bold px-3 py-1 rounded-full">130 W</div>
</div>
<!-- Center: LPS II Unit & SOC -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center z-20 w-40 h-40">
<!-- Stylized Unit Background representing the LPS II -->
<div class="absolute inset-0 bg-surface-container-highest rounded-3xl border border-primary/40 shadow-[0_0_40px_rgba(0,122,255,0.15)] overflow-hidden">
<div class="absolute top-0 w-full h-2 bg-primary/20"></div>
<div class="absolute bottom-0 w-full h-4 bg-black/40"></div>
</div>
<!-- SOC Content -->
<div class="relative flex flex-col items-center z-10">
<div class="flex items-baseline text-white">
<span class="font-display-lg text-5xl font-black">85</span>
<span class="font-headline-md text-xl ml-1 text-primary">%</span>
</div>
<span class="font-label-sm text-primary tracking-widest uppercase mt-1 mb-2 text-[10px]">Charging</span>
<span class="font-data-tabular text-sm text-on-surface-variant">02:45 <span class="text-[10px]">LEFT</span></span>
</div>
</div>
<!-- Bottom Left: AC Output -->
<div class="absolute bottom-[5%] left-[10%] flex flex-col items-center z-10 w-24">
<div class="w-12 h-12 rounded-full bg-surface-container-high border-2 border-primary flex items-center justify-center shadow-[0_0_15px_rgba(0,122,255,0.3)] mb-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">power</span>
</div>
<span class="font-label-sm text-on-surface-variant mb-1">230V AC</span>
<div class="bg-primary text-white text-[11px] font-bold px-3 py-1 rounded-full">80 W</div>
</div>
<!-- Bottom Right: DC Output (Inactive) -->
<div class="absolute bottom-[5%] right-[10%] flex flex-col items-center z-10 w-24 opacity-60">
<div class="w-12 h-12 rounded-full bg-surface-container-high border-2 border-outline-variant flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-outline-variant text-2xl">usb</span>
</div>
<span class="font-label-sm text-on-surface-variant mb-1">12V DC</span>
<div class="bg-surface-container-highest text-on-surface-variant border border-outline-variant text-[11px] font-bold px-3 py-1 rounded-full">0 W</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="flex justify-around items-center px-8 pb-safe fixed bottom-0 w-full z-50 h-20 rounded-t-lg shadow-[0px_-4px_20px_rgba(0,0,0,0.5)] bg-[#1C1C1E]">
<!-- Connect (Inactive) -->
<button class="flex flex-col items-center justify-center text-zinc-500 transition-colors duration-200 hover:text-zinc-200 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1">bluetooth_connected</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider">Connect</span>
</button>
<!-- Dashboard (Active) -->
<button class="flex flex-col items-center justify-center text-[#007AFF] transition-colors duration-200 hover:text-zinc-200 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider">Dashboard</span>
</button>
<!-- Settings (Inactive) -->
<button class="flex flex-col items-center justify-center text-zinc-500 transition-colors duration-200 hover:text-zinc-200 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider">Settings</span>
</button>
</nav>
</body></html>
