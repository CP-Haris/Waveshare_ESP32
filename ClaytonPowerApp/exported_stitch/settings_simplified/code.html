<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar JSON Translation -->
<header class="fixed top-0 z-50 w-full flex justify-between items-center h-16 px-6 bg-[#121212] border-none flat no shadows">
<button aria-label="System Status" class="text-[#007AFF] hover:opacity-80 transition-all active:scale-95 flex items-center justify-center w-10 h-10 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">bolt</span>
</button>
<h1 class="text-zinc-50 font-black tracking-tighter text-sm uppercase">CLAYTON POWER</h1>
<button aria-label="Battery Status" class="text-[#007AFF] hover:opacity-80 transition-all active:scale-95 flex items-center justify-center w-10 h-10 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 pb-28 px-container-padding flex flex-col gap-xl max-w-2xl mx-auto w-full">
<!-- Active Unit Header Anchor -->
<section class="flex flex-col gap-sm pt-md">
<div class="flex items-center gap-sm">
<span class="w-2 h-2 rounded-full bg-[#34C759] shadow-[0_0_8px_rgba(52,199,89,0.4)]"></span>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">Active Device</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">LPS II 3000W</h2>
<p class="font-body-base text-body-base text-on-surface-variant opacity-80">100Ah • FW v2.4.1</p>
</section>
<!-- Power Interfaces Settings Cluster -->
<section class="flex flex-col gap-md">
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-widest pl-xs">Power Configuration</h3>
<div class="flex flex-col gap-unit">
<!-- AC Output -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md rounded-t-lg flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">power</span>
</div>
<div class="flex flex-col flex-grow">
<span class="font-body-base text-body-base text-on-surface">AC Output</span>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70 mt-1">Inverter Settings</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-data-tabular text-data-tabular text-[#007AFF]">230V</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</div>
</button>
<!-- AC Input -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">power_input</span>
</div>
<div class="flex flex-col flex-grow">
<span class="font-body-base text-body-base text-on-surface">AC Input</span>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70 mt-1">Mains Charge Limit</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-data-tabular text-data-tabular text-on-surface">15A</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</div>
</button>
<!-- DC Output -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">battery_charging_full</span>
</div>
<div class="flex flex-col flex-grow">
<span class="font-body-base text-body-base text-on-surface">DC Output</span>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70 mt-1">12V System</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-data-tabular text-data-tabular text-[#34C759]">Active</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</div>
</button>
<!-- DC Input -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md rounded-b-lg flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">settings_input_component</span>
</div>
<div class="flex flex-col flex-grow">
<span class="font-body-base text-body-base text-on-surface">DC Input</span>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70 mt-1">Alternator / Solar</span>
</div>
<div class="flex items-center gap-sm">
<span class="font-data-tabular text-data-tabular text-on-surface">Smart</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- System Settings Cluster -->
<section class="flex flex-col gap-md">
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-widest pl-xs">System Preferences</h3>
<div class="flex flex-col gap-unit">
<!-- Display -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md rounded-t-lg flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">light_mode</span>
</div>
<span class="font-body-base text-body-base text-on-surface flex-grow">Display &amp; Brightness</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
<!-- Network -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">wifi</span>
</div>
<span class="font-body-base text-body-base text-on-surface flex-grow">Network Configuration</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
<!-- About -->
<button class="w-full bg-surface-container-low hover:bg-surface-container transition-colors p-md rounded-b-lg flex items-center gap-md group text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined">info</span>
</div>
<span class="font-body-base text-body-base text-on-surface flex-grow">About &amp; Diagnostics</span>
<span class="material-symbols-outlined text-outline group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
</div>
</section>
